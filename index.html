<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新卒仮配属 評価フォーム | GULGUL</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1e;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d45;
  --accent: #3b82f6;
  --green: #10b981;
  --red: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --mono: "DM Mono", monospace;
  --sans: "Noto Sans JP", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
body::before {
  content: "";
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
.container { max-width: 580px; margin: 0 auto; padding: 0 16px 60px; position: relative; z-index: 1; }
.header {
  background: rgba(17,24,39,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
}
.header-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
.header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-top: 2px; }
.admin-btn {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  background: transparent; border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 6px; cursor: pointer;
}
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 14px; }
.card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; font-size: 13px;
  cursor: pointer; color: var(--muted); font-family: var(--sans);
}
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
.chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.score-row { display: flex; gap: 6px; margin-top: 8px; }
.score-btn {
  flex: 1; padding: 11px 0; border-radius: 8px; border: none;
  cursor: pointer; font-size: 14px; font-weight: 700;
  background: var(--surface2); color: var(--muted); font-family: var(--sans);
}
.score-btn.on1 { background: #ef4444; color: #fff; }
.score-btn.on2 { background: #f97316; color: #fff; }
.score-btn.on3 { background: #eab308; color: #fff; }
.score-btn.on4 { background: #22c55e; color: #fff; }
.score-btn.on5 { background: #10b981; color: #fff; }
.eval-item { margin-bottom: 12px; }
.eval-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.eval-name { font-size: 13px; font-weight: 500; }
.eval-score { font-family: var(--mono); font-size: 17px; font-weight: 700; }
.btn-primary {
  width: 100%; padding: 15px; border: none; border-radius: 12px;
  background: var(--accent); color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: var(--sans); margin-top: 14px;
}
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary.green { background: var(--green); }
.btn-ghost {
  padding: 13px 20px; border: 1px solid var(--border); border-radius: 12px;
  background: transparent; color: var(--muted); font-size: 14px;
  cursor: pointer; font-family: var(--sans);
}
.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.btn-row .btn-primary { margin-top: 0; }
.info-card { background: rgba(37,99,235,0.1); border: 1px solid rgba(37,99,235,0.3); border-radius: 12px; padding: 14px 16px; margin-top: 14px; }
.info-store { font-size: 12px; color: #93c5fd; }
.info-name { font-size: 17px; font-weight: 700; color: #dbeafe; margin-top: 2px; }
.info-period { font-size: 11px; color: #475569; margin-top: 3px; font-family: var(--mono); }
.confirm-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.confirm-label { font-size: 12px; color: var(--muted); }
.confirm-val { font-family: var(--mono); font-weight: 700; font-size: 14px; }
.total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; margin-top: 6px; }
.total-label { font-size: 15px; font-weight: 700; }
.total-val { font-family: var(--mono); font-size: 26px; font-weight: 700; }
.done-wrap { text-align: center; padding: 56px 20px; }
.done-icon { font-size: 60px; margin-bottom: 16px; }
.done-title { font-size: 20px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
.done-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); padding: 10px 12px;
  font-size: 13px; resize: vertical; min-height: 70px;
  font-family: var(--sans); outline: none; margin-top: 8px;
}
.admin-login { max-width: 360px; margin: 60px auto; }
.admin-login h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.admin-login p { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
input[type=password] {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); padding: 12px 14px;
  font-size: 15px; font-family: var(--mono); outline: none;
}
.err { color: var(--red); font-size: 12px; margin-top: 8px; }
.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-top: 10px; cursor: pointer; }
.result-name { font-size: 15px; font-weight: 700; }
.result-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.bar-row { display: flex; gap: 3px; margin-top: 10px; }
.bar-seg { flex: 1; height: 4px; border-radius: 2px; }
.sending { position: fixed; inset: 0; background: rgba(10,15,30,0.85); display: flex; align-items: center; justify-content: center; z-index: 999; font-size: 15px; font-weight: 700; }
</style>
</head>

<script>

var PERIODS = ["4/16〜4/28", "4/29〜5/12", "5/13〜5/26", "5/27〜6/9", "6/10〜6/30"];

var SCHEDULE = {
  "4/16〜4/28": {

    "下総中山": ["渡邉柚月", "大塚杏"],
    "本八幡": ["鈴木里桜"],
    "smoos'": ["大竹椿咲", "西牟田紗季"],
    "表参道": ["青木花歩", "鈴木凛"],
    "aoakua": ["荒日南多", "梶内心結"],
    "elu": ["村岡愛莉", "岡田彩里", "遠山蒼衣"],
    "few.": ["河井心音", "河村恋羽", "行田歩直"]
  },
  "5/13〜5/26": {
    "新小岩": ["梶内心結", "河村恋羽"],
    "妙典": ["行田歩直", "鈴木里桜"],
    "下総中山": ["河井心音", "遠山蒼衣"],
    "本八幡": ["青木花歩"],
    "smoos'": ["村岡愛莉", "渡瀬明日花"],
    "表参道": ["岡田彩里", "佃澪那"],
    "aoakua": ["渡邉柚月", "大塚杏", "大山華鈴"],
    "elu": ["大竹椿咲", "荒日南多", "西牟田紗季"],

  },
  "5/27〜6/9": {
    "新小岩": ["木村結", "遠山蒼衣"],
    "妙典": ["鈴木凛", "西牟田紗季"],
    "下総中山": ["荒日南多", "大山華鈴", "行田歩直"],
    "本八幡": ["渡邉柚月"],
    "smoos'": ["青木花歩", "河村恋羽"],
    "表参道": ["村岡愛莉", "梶内心結"],
    "aoakua": ["大竹椿咲", "渡瀬明日花"],
    "elu": ["河井心音", "鈴木里桜", "佃澪那"],

  },

    "本八幡": ["大塚杏"],
    "smoos'": ["荒日南多", "梶内心結", "行田歩直"],
    "表参道": ["河井心音", "西牟田紗季"],
    "aoakua": ["村岡愛莉", "佃澪那"],
    "elu": ["青木花歩", "河村恋羽", "鈴木凛"],
    "few.": ["渡邉柚月", "大山華鈴", "渡瀬明日花"]
  }
};

var ITEMS = [
  {key:"greeting", label:"挨拶"},
  {key:"memo", label:"メモ"},
  {key:"proactive", label:"積極性"},
  {key:"service", label:"元気よく接客できているか"},
  {key:"praised", label:"お客様に褒められる"},
  {key:"staff_comm", label:"スタッフとのコミュニケーション力"},
  {key:"client_comm", label:"お客様とのコミュニケーション力"},
  {key:"attitude", label:"勤務態度"},
  {key:"goal", label:"１ヶ月の目標に対する達成率"},
  {key:"training", label:"研修・練習態度"}
];

var state = {
  phase: "select",
  period: "", store: "", junior: "",
  scores: {}, comment: "",
  results: [],
  viewResult: null,
  adminErr: ""
};

function emptyScores() {
  var s = {};
  for (var i = 0; i < ITEMS.length; i++) s[ITEMS[i].key] = 0;
  return s;
}

function scoreColor(s) {
  if (s === 0) return "#334155";
  if (s === 1) return "#ef4444";
  if (s === 2) return "#f97316";
  if (s === 3) return "#eab308";
  if (s === 4) return "#22c55e";
  return "#10b981";
}

function totalColor(t) {
  if (t < 20) return "#ef4444";
  if (t < 30) return "#f97316";
  if (t < 40) return "#eab308";
  if (t < 46) return "#22c55e";
  return "#10b981";
}

function getTotal() {
  var t = 0;
  for (var k in state.scores) t += state.scores[k];
  return t;
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  for (var k in attrs) {
    if (k === "className") e.className = attrs[k];
    else if (k === "style") e.style.cssText = attrs[k];
    else if (k.indexOf("on") === 0) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  if (children) {
    if (typeof children === "string") e.innerHTML = children;
    else if (Array.isArray(children)) children.forEach(function(c) { if (c) e.appendChild(c); });
    else e.appendChild(children);
  }
  return e;
}

function txt(str) { return document.createTextNode(str); }

function render() {
  var app = document.getElementById("app");
  app.innerHTML = "";
  var content;
  if (state.phase === "select") content = renderSelect();
  else if (state.phase === "eval") content = renderEval();
  else if (state.phase === "confirm") content = renderConfirm();
  else if (state.phase === "done") content = renderDone();
  else if (state.phase === "admin_login") content = renderAdminLogin();
  else if (state.phase === "admin_results") content = renderAdminResults();
  else if (state.phase === "admin_detail") content = renderAdminDetail();
  if (content) app.appendChild(content);
}

function renderSelect() {
  var wrap = el("div", {style: "padding-top:20px"});

  // Period
  var pc = el("div", {className: "card"});
  pc.appendChild(el("div", {className: "card-label"}, "評価期間を選ぶ"));
  var chips1 = el("div", {className: "chips"});
  PERIODS.forEach(function(p) {
    var btn = el("button", {className: "chip" + (state.period === p ? " active" : "")}, p);
    btn.onclick = function() { state.period = p; state.store = ""; state.junior = ""; render(); };
    chips1.appendChild(btn);
  });
  pc.appendChild(chips1);
  wrap.appendChild(pc);

  // Store
  if (state.period) {
    var sc = el("div", {className: "card"});
    sc.appendChild(el("div", {className: "card-label"}, "店舗を選ぶ"));
    var chips2 = el("div", {className: "chips"});
    var stores = Object.keys(SCHEDULE[state.period]);
    stores.forEach(function(s) {
      var btn = el("button", {className: "chip" + (state.store === s ? " active" : "")}, s);
      btn.onclick = function() { state.store = s; state.junior = ""; render(); };
      chips2.appendChild(btn);
    });
    sc.appendChild(chips2);
    wrap.appendChild(sc);
  }

  // Junior
  if (state.store) {
    var jc = el("div", {className: "card"});
    jc.appendChild(el("div", {className: "card-label"}, "評価するスタッフ"));
    var grid = el("div", {className: "chip-grid"});
    var juniors = SCHEDULE[state.period][state.store] || [];
    juniors.forEach(function(j) {
      var btn = el("button", {className: "chip" + (state.junior === j ? " active" : "")}, j);
      btn.onclick = function() { state.junior = j; render(); };
      grid.appendChild(btn);
    });
    jc.appendChild(grid);
    wrap.appendChild(jc);
  }

  var startBtn = el("button", {className: "btn-primary"}, "評価を始める →");
  if (!state.period || !state.store || !state.junior) startBtn.disabled = true;
  startBtn.onclick = function() { state.scores = emptyScores(); state.comment = ""; state.phase = "eval"; render(); };
  wrap.appendChild(startBtn);
  return wrap;
}

function renderEval() {
  var wrap = el("div", {style: "padding-top:20px"});

  var info = el("div", {className: "info-card"});
  info.appendChild(el("div", {className: "info-store"}, state.store));
  info.appendChild(el("div", {className: "info-name"}, state.junior));
  info.appendChild(el("div", {className: "info-period"}, state.period));
  wrap.appendChild(info);

  var card = el("div", {className: "card", style: "margin-top:14px"});
  ITEMS.forEach(function(item) {
    var s = state.scores[item.key] || 0;
    var div = el("div", {className: "eval-item"});
    var header = el("div", {className: "eval-header"});
    header.appendChild(el("span", {className: "eval-name"}, item.label));
    var scoreSpan = el("span", {className: "eval-score", style: "color:" + scoreColor(s)}, s + "");
    scoreSpan.appendChild(el("span", {style: "color:var(--muted);font-size:12px"}, "/5"));
    header.appendChild(scoreSpan);
    div.appendChild(header);
    var row = el("div", {className: "score-row"});
    for (var n = 1; n <= 5; n++) {
      (function(n) {
        var cls = "score-btn" + (state.scores[item.key] === n ? " on" + n : "");
        var btn = el("button", {className: cls}, n + "");
        btn.onclick = function() { state.scores[item.key] = n; render(); };
        row.appendChild(btn);
      })(n);
    }
    div.appendChild(row);
    card.appendChild(div);
  });
  wrap.appendChild(card);

  var commentCard = el("div", {className: "card"});
  commentCard.appendChild(el("div", {className: "card-label"}, "コメント（任意）"));
  var ta = el("textarea", {placeholder: "気になった点や特記事項があれば..."});
  ta.value = state.comment;
  ta.onchange = function() { state.comment = this.value; };
  commentCard.appendChild(ta);
  wrap.appendChild(commentCard);

  var btnRow = el("div", {className: "btn-row"});
  var backBtn = el("button", {className: "btn-ghost"}, "← 戻る");
  backBtn.onclick = function() { state.phase = "select"; render(); };
  var nextBtn = el("button", {className: "btn-primary", style: "flex:1"}, "確認する");
  nextBtn.onclick = function() {
    var missing = ITEMS.filter(function(i) { return !state.scores[i.key]; });
    if (missing.length > 0) { alert("未評価の項目があります"); return; }
    state.phase = "confirm"; render();
  };
  btnRow.appendChild(backBtn);
  btnRow.appendChild(nextBtn);
  wrap.appendChild(btnRow);
  return wrap;
}

function renderConfirm() {
  var total = getTotal();
  var wrap = el("div", {style: "padding-top:20px"});

  var info = el("div", {className: "info-card"});
  info.appendChild(el("div", {className: "info-store"}, state.store));
  info.appendChild(el("div", {className: "info-name"}, state.junior));
  info.appendChild(el("div", {className: "info-period"}, state.period));
  wrap.appendChild(info);

  var card = el("div", {className: "card"});
  ITEMS.forEach(function(item) {
    var s = state.scores[item.key] || 0;
    var row = el("div", {className: "confirm-row"});
    row.appendChild(el("span", {className: "confirm-label"}, item.label));
    var val = el("span", {className: "confirm-val", style: "color:" + scoreColor(s)}, s + "");
    val.appendChild(el("span", {style: "color:var(--muted);font-size:11px"}, "/5"));
    row.appendChild(val);
    card.appendChild(row);
  });
  var totalRow = el("div", {className: "total-row"});
  totalRow.appendChild(el("span", {className: "total-label"}, "合計"));
  var tv = el("span", {className: "total-val", style: "color:" + totalColor(total)}, total + "");
  tv.appendChild(el("span", {style: "color:var(--muted);font-size:14px"}, "/50"));
  totalRow.appendChild(tv);
  card.appendChild(totalRow);
  wrap.appendChild(card);

  if (state.comment) {
    var cc = el("div", {className: "card", style: "margin-top:10px"});
    cc.appendChild(el("div", {className: "card-label"}, "コメント"));
    cc.appendChild(el("p", {style: "font-size:13px;color:#cbd5e1;margin-top:6px"}, state.comment));
    wrap.appendChild(cc);
  }

  var btnRow = el("div", {className: "btn-row"});
  var backBtn = el("button", {className: "btn-ghost"}, "← 修正");
  backBtn.onclick = function() { state.phase = "eval"; render(); };
  var sendBtn = el("button", {className: "btn-primary green", style: "flex:1"}, "送信する ✓");
  sendBtn.onclick = submitEval;
  btnRow.appendChild(backBtn);
  btnRow.appendChild(sendBtn);
  wrap.appendChild(btnRow);
  return wrap;
}

function renderDone() {
  var wrap = el("div", {className: "done-wrap"});
  wrap.appendChild(el("div", {className: "done-icon"}, "✅"));
  wrap.appendChild(el("div", {className: "done-title"}, "送信完了！"));
  wrap.appendChild(el("div", {className: "done-sub"}, state.junior + " の評価を記録しました"));
  var btn = el("button", {className: "btn-primary"}, "続けて評価する");
  btn.onclick = function() { state.period = ""; state.store = ""; state.junior = ""; state.scores = {}; state.comment = ""; state.phase = "select"; render(); };
  wrap.appendChild(btn);
  return wrap;
}

function renderAdminLogin() {
  var wrap = el("div", {className: "admin-login"});
  wrap.appendChild(el("h2", {}, "管理者ログイン"));
  wrap.appendChild(el("p", {}, "パスワードを入力してください"));
  var pw = el("input", {type: "password", id: "pwInput", placeholder: "パスワード"});
  pw.onkeydown = function(e) { if (e.key === "Enter") checkAdmin(); };
  wrap.appendChild(pw);
  if (state.adminErr) wrap.appendChild(el("div", {className: "err"}, state.adminErr));
  var btn = el("button", {className: "btn-primary", style: "margin-top:14px"}, "ログイン");
  btn.onclick = checkAdmin;
  wrap.appendChild(btn);
  var back = el("button", {className: "btn-ghost", style: "margin-top:10px;width:100%"}, "← 戻る");
  back.onclick = function() { state.phase = "select"; render(); };
  wrap.appendChild(back);
  return wrap;
}

function renderAdminResults() {
  var wrap = el("div", {style: "padding-top:20px"});
  var hdr = el("div", {style: "display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"});
  hdr.appendChild(el("span", {style: "font-size:13px;color:var(--muted)"}, "評価済み：" + state.results.length + "件"));
  var back = el("button", {className: "admin-btn"}, "← 入力画面");
  back.onclick = function() { state.phase = "select"; render(); };
  hdr.appendChild(back);
  wrap.appendChild(hdr);

  if (state.results.length === 0) {
    wrap.appendChild(el("div", {className: "card", style: "text-align:center;color:var(--muted);padding:40px"}, "まだデータがありません"));
  }

  state.results.forEach(function(r, i) {
    var card = el("div", {className: "result-card"});
    var rh = el("div", {style: "display:flex;justify-content:space-between;align-items:flex-start"});
    var rl = el("div", {});
    rl.appendChild(el("div", {className: "result-name"}, r.junior));
    rl.appendChild(el("div", {className: "result-meta"}, r.store + " · " + r.period));
    rh.appendChild(rl);
    var tv = el("span", {style: "font-family:var(--mono);font-size:22px;font-weight:700;color:" + totalColor(r.total)}, r.total + "");
    tv.appendChild(el("span", {style: "color:var(--muted);font-size:12px"}, "/50"));
    rh.appendChild(tv);
    card.appendChild(rh);
    var bars = el("div", {className: "bar-row"});
    ITEMS.forEach(function(item) {
      bars.appendChild(el("div", {className: "bar-seg", style: "background:" + scoreColor(r.scores[item.key] || 0)}));
    });
    card.appendChild(bars);
    card.onclick = function() { state.viewResult = r; state.phase = "admin_detail"; render(); };
    wrap.appendChild(card);
  });
  return wrap;
}

function renderAdminDetail() {
  var r = state.viewResult;
  if (!r) return el("div", {});
  var wrap = el("div", {style: "padding-top:20px"});
  var back = el("button", {className: "btn-ghost", style: "margin-bottom:14px"}, "← 一覧へ");
  back.onclick = function() { state.phase = "admin_results"; render(); };
  wrap.appendChild(back);

  var info = el("div", {className: "info-card"});
  info.appendChild(el("div", {className: "info-store"}, r.store));
  info.appendChild(el("div", {className: "info-name"}, r.junior));
  info.appendChild(el("div", {className: "info-period"}, r.period));
  wrap.appendChild(info);

  var card = el("div", {className: "card"});
  ITEMS.forEach(function(item) {
    var s = r.scores[item.key] || 0;
    var row = el("div", {className: "confirm-row"});
    row.appendChild(el("span", {className: "confirm-label"}, item.label));
    var val = el("span", {className: "confirm-val", style: "color:" + scoreColor(s)}, s + "/5");
    row.appendChild(val);
    card.appendChild(row);
  });
  var totalRow = el("div", {className: "total-row"});
  totalRow.appendChild(el("span", {className: "total-label"}, "合計"));
  var tv = el("span", {className: "total-val", style: "color:" + totalColor(r.total)}, r.total + "");
  tv.appendChild(el("span", {style: "color:var(--muted);font-size:14px"}, "/50"));
  totalRow.appendChild(tv);
  card.appendChild(totalRow);
  wrap.appendChild(card);
  return wrap;
}

function submitEval() {
  var total = getTotal();
  var payload = {
    period: state.period,
    store: state.store,
    junior: state.junior,
    scores: state.scores,
    comment: state.comment,
    total: total,
    submittedAt: new Date().toLocaleString("ja-JP")
  };
  state.results.push(payload);
  document.getElementById("sending").style.display = "flex";
  fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  }).then(function() {
    document.getElementById("sending").style.display = "none";
    state.phase = "done"; render();
  }).catch(function() {
    document.getElementById("sending").style.display = "none";
    state.phase = "done"; render();
  });
}

function goAdmin() { state.adminErr = ""; state.phase = "admin_login"; render(); }

function checkAdmin() {
  var pw = document.getElementById("pwInput");
  if (pw && pw.value === ADMIN_PASSWORD) {
    state.phase = "admin_results"; render();
  } else {
    state.adminErr = "パスワードが違います"; render();
  }
}

render();
</script>

</body>
</html>
